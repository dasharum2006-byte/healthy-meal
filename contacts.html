<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контакты — ЗдоровыйОбед</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <header class="header pure-g">
    <div class="pure-u-1 pure-u-md-1-3">
      <h1 class="logo">ЗдоровыйОбед</h1>
    </div>
    <nav class="pure-u-1 pure-u-md-2-3 nav-menu">
      <ul class="pure-menu-list">
        <li class="pure-menu-item"><a href="index.html" class="pure-menu-link">Главная</a></li>
        <li class="pure-menu-item"><a href="contacts.html" class="pure-menu-link active">Контакты</a></li>
        <li class="pure-menu-item"><a href="faq.html" class="pure-menu-link">FAQ</a></li>
      </ul>
    </nav>
  </header>

  <main class="container pure-g">
    <div class="pure-u-1 pure-u-md-1-2">
      <h2>Оставьте отзыв или задайте вопрос</h2>
      <form class="pure-form pure-form-aligned feedback-form" id="feedbackForm">
        <fieldset>
          <div class="pure-control-group">
            <label for="name">Имя</label>
            <input id="name" type="text" placeholder="Ваше имя" required />
          </div>

          <div class="pure-control-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="example@email.com" required />
          </div>

          <div class="pure-control-group">
            <label for="topic">Тема</label>
            <select id="topic" required>
              <option value="">Выберите тему</option>
              <option>Предложение</option>
              <option>Жалоба</option>
              <option>Вопрос</option>
              <option>Благодарность</option>
            </select>
          </div>

          <div class="pure-control-group">
            <label for="message">Сообщение</label>
            <textarea id="message" rows="5" placeholder="Ваше сообщение..." required></textarea>
          </div>

          <div class="pure-controls">
            <label for="consent" class="pure-checkbox">
              <input id="consent" type="checkbox" required /> Соглашаюсь на обработку персональных данных
            </label>
            <button type="submit" class="pure-button pure-button-primary">Отправить</button>
          </div>
        </fieldset>
      </form>
    </div>

    <div class="pure-u-1 pure-u-md-1-2 contact-info">
      <h3>Контакты</h3>
      <p>📍 Москва, д. 1</p>
      <p>📞 +7 (507) 999-45-67</p>
      <p>✉️ info@wealthy.ru</p>
      <p>
        <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a> |
        <a href="https://vk.com" target="_blank" rel="noopener">VK</a>
      </p>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 ЗдоровыйОбед. Все права защищены.</p>
  </footer>

</body>
</html>
